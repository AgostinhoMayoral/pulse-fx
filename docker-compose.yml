services:
  postgres:
    image: postgres:16-alpine
    container_name: pulsefx-postgres
    environment:
      POSTGRES_USER: pulsefx
      POSTGRES_PASSWORD: pulsefx
      POSTGRES_DB: pulsefx
    ports:
      - '5432:5432'
    volumes:
      - pulsefx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulsefx -d pulsefx']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pulsefx-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pulsefx:pulsefx@postgres:5432/pulsefx
      FRED_API_KEY: ${FRED_API_KEY}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
      SYNC_TTL_DAILY_HOURS: 6
      SYNC_TTL_MONTHLY_HOURS: 24
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3001/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: pulsefx-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '5173:80'

volumes:
  pulsefx_pg_data:
