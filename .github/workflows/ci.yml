name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulsefx
          POSTGRES_PASSWORD: pulsefx
          POSTGRES_DB: pulsefx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulsefx -d pulsefx_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pulsefx:pulsefx@localhost:5432/pulsefx_test
      TEST_DATABASE_URL: postgresql://pulsefx:pulsefx@localhost:5432/pulsefx_test
      FRED_API_KEY: ci-test-fred-key
      ADMIN_TOKEN: ci-test-admin-token-secure
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
